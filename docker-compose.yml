# 단일 VPS(Vultr) self-host 운영 스택. Cloudflare Tunnel 뒤에서 동작한다.
# 외부 공개 포트를 열지 않는다(인바운드 0). 모든 진입은 cloudflared 의 outbound 터널로만 들어온다.
#
# 사전 준비:  cp .env.example .env  &&  .env 값 채우기  &&  cloudflared/ 에 config.yml·credentials.json 배치
# 실행:       docker compose up -d --build
# 갱신:       git pull && docker compose up -d --build
name: daeoebi

services:
    postgres:
        image: postgres:17-alpine
        container_name: daeoebi-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-secrets}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 를 .env 에 설정하세요}
            POSTGRES_DB: ${POSTGRES_DB:-daeoebi}
        # 공개 포트 없음. 내부 도커 네트워크로만 접근한다.
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-secrets} -d ${POSTGRES_DB:-daeoebi}",
                ]
            interval: 5s
            timeout: 5s
            retries: 5

    api:
        build:
            context: .
            dockerfile: Dockerfile
            target: api
        container_name: daeoebi-api
        restart: unless-stopped
        environment:
            NODE_ENV: production
            DATABASE_URL: postgresql://${POSTGRES_USER:-secrets}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-daeoebi}?schema=public
            HOST: 0.0.0.0
            PORT: 4000
            # same-origin 경로 분리. 브라우저는 https://DOMAIN/api/* 로 호출하고 cloudflared 가 그대로 전달한다.
            API_GLOBAL_PREFIX: api
            TRUST_PROXY: "1"
            COOKIE_SECURE: "true"
            WEBAUTHN_RP_ID: ${DOMAIN:?DOMAIN 을 .env 에 설정하세요}
            WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-대외비}
            # WebAuthn 기대 오리진 + CSRF 허용 오리진(동일 값). same-origin 이라 https://DOMAIN 하나면 된다.
            VAULT_ALLOWED_ORIGINS: https://${DOMAIN}
            CORS_ORIGIN: https://${DOMAIN}
            # 패스키 첫 등록 게이트 토큰. 미설정 시 기동을 거부한다(첫 등록 fail-closed).
            BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:?BOOTSTRAP_TOKEN 을 .env 에 설정하세요}
        depends_on:
            postgres:
                condition: service_healthy
        # 마이그레이션 적용 후 /api 프리픽스로 status 응답을 확인한다.
        healthcheck:
            test:
                [
                    "CMD",
                    "node",
                    "-e",
                    "fetch('http://localhost:4000/api/auth/status').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
                ]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 40s

    web:
        build:
            context: .
            dockerfile: Dockerfile
            target: web
            args:
                # 상대경로 /api → 페이지와 같은 오리진. 호스트 불일치로 인한 쿠키 미전송 문제가 구조적으로 사라진다.
                # NEXT_PUBLIC_* 는 빌드 시점에 인라인되므로 도메인이 바뀌어도 이 값(/api)은 그대로 둔다.
                NEXT_PUBLIC_API_BASE_URL: /api
        container_name: daeoebi-web
        restart: unless-stopped
        depends_on:
            - api

    # Cloudflare Tunnel. 웹·API·SSH 인그레스를 cloudflared/config.yml 로 라우팅한다.
    cloudflared:
        image: cloudflare/cloudflared:latest
        container_name: daeoebi-cloudflared
        restart: unless-stopped
        command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
        volumes:
            # config.yml 과 credentials.json 을 읽기 전용으로 마운트한다.
            - ./cloudflared:/etc/cloudflared:ro
        extra_hosts:
            # 컨테이너에서 호스트의 SSH(22)로 접근하기 위한 매핑(Linux: host-gateway).
            - "host.docker.internal:host-gateway"
        depends_on:
            - web
            - api

volumes:
    postgres-data:
