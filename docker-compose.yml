# 로컬 개발용 PostgreSQL. 앱은 추후 web·api·cloudflared 서비스로 확장한다.
services:
  postgres:
    image: postgres:17-alpine
    container_name: secrets-manager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: secrets
      POSTGRES_PASSWORD: secrets
      POSTGRES_DB: secrets_manager
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secrets -d secrets_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
