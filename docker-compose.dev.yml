# 개발용 스택. DB(PostgreSQL)만 도커로 띄운다.
# api·web 은 호스트에서 직접 실행한다(pnpm dev / make dev-up). 운영(docker-compose.yml)과 분리.
#
# 실행:   make dev-up      (종료: make dev-down / 데이터삭제: make dev-down-reset)
#         직접 쓸 땐 --env-file apps/api/.env.development 을 붙인다(${} 치환 출처).
#
# DB 자격증명은 apps/api/.env.development 한 곳에서 온다(POSTGRES_* 치환 + 호스트 api 의 DATABASE_URL).
name: daeoebi-dev

services:
    db:
        image: postgres:17-alpine
        container_name: daeoebi-dev-db
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-secrets}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secrets}
            POSTGRES_DB: ${POSTGRES_DB:-daeoebi}
        ports:
            - "127.0.0.1:5431:5432"
        volumes:
            - db-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secrets} -d ${POSTGRES_DB:-daeoebi}"]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    db-data:
