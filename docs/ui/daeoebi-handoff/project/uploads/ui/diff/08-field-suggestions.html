<!--
[화면 8 · 필드 추천] 디자인 원본 마크업 ( {{ }} 는 DC 템플릿 바인딩 )
현재 구현: 독립 화면 없음 — apps/web/app/(vault)/_lib/field-suggestions.ts 의 추천 칩이
          신규/수정 폼 1단계(SecretEditStep) 안에 인라인으로만 노출됨.

디자인과 다른 점:
- 디자인은 "필드 추천"을 그룹 카드로 보여주는 별도 화면으로 설계 / 앱은 이 화면을 구현하지 않음(폼 내 칩으로 대체).
- 즉 이 화면 전체가 디자인에만 존재(미구현 추가분).
-->

        <sc-if value="{{ isReference }}" hint-placeholder-val="{{ false }}">
          <div style="min-height:100%;background:var(--tint,#fafafa)">
            <div style="position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:10px;padding:30px 16px 14px;background:rgba(255,255,255,.82);backdrop-filter:blur(14px);border-bottom:1px solid #efefef">
              <button onClick="{{ goList }}" style="border:none;background:none;font:inherit;font-size:15px;color:#666;cursor:pointer">←</button>
              <div><div style="font-size:17px;font-weight:800;letter-spacing:-.02em">필드 추천</div></div>
            </div>
            <div class="stagger" style="padding:18px 16px 50px;display:flex;flex-direction:column;gap:14px">
              <p style="font-size:13px;line-height:1.55;color:#9a9a9a;font-weight:500;margin:-2px 2px 2px">자주 쓰는 필드 이름이에요. 새 항목을 만들 때 폼에서 빠르게 추가하는 보조 목록입니다.</p>
              <sc-for list="{{ suggestGroups }}" as="sg" hint-placeholder-count="4">
                <div style="border:1px solid #efefef;border-radius:16px;background:#fff;overflow:hidden">
                  <div style="padding:14px 16px 6px;font-size:12px;font-weight:800;color:var(--ac,#171717);letter-spacing:.01em">{{ sg.group }}</div>
                  <div style="padding:4px 16px 14px;display:flex;flex-wrap:wrap;gap:7px">
                    <sc-for list="{{ sg.names }}" as="nm" hint-placeholder-count="4">
                      <span style="font-size:13.5px;font-weight:600;color:#555;background:var(--tint,#f7f7f7);border:1px solid #eee;padding:7px 13px;border-radius:999px">{{ nm.name }}</span>
                    </sc-for>
                  </div>
                </div>
              </sc-for>
              <button onClick="{{ goNew }}" style="height:52px;border:none;border-radius:14px;background:var(--ac,#171717);color:#fff;font:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px" style-active="transform:scale(.98)">새 항목 만들기</button>
            </div>
          </div>
        </sc-if>
