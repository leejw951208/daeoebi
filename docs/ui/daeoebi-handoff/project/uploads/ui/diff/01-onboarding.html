<!--
[화면 1 · 온보딩] 디자인 원본 마크업 ( {{ }} 는 DC 템플릿 바인딩 )
현재 구현: apps/web/app/(vault)/auth/OnboardingScreen.tsx

디자인과 다른 점:
- 헤드라인: 디자인 "비밀번호도 가계부도, 안전하게 잠가두고 필요할 때만 엽니다"(가계부/자산 강조)
           ↔ 앱 "비밀번호를 안전하게 잠가두고, 필요할 때만 엽니다"(비밀번호만 언급)
- eyebrow: 디자인 "암호화 대외비 · 자산 관리" ↔ 앱 "대외비"
- 체크 리스트: 디자인 3줄(본인 확인 / 수입·지출과 남는 돈 자동 정리 / 자동 재잠금)
             ↔ 앱 2줄(가계부 관련 줄 없음)
- 부트스트랩 토큰 입력: 디자인에는 없음 / 앱에는 있음
-->

        <sc-if value="{{ isOnboarding }}" hint-placeholder-val="{{ true }}">
          <div style="min-height:100%;display:flex;flex-direction:column;padding:56px 26px 30px;background:linear-gradient(180deg,var(--tint,#fafafa),#fff)">
            <div class="stagger" style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:0">
              <div style="width:58px;height:58px;border-radius:18px;background:var(--ac,#171717);display:flex;align-items:center;justify-content:center;margin-bottom:30px;animation:pop .5s both">
                <div style="width:20px;height:24px;border:3px solid #fff;border-radius:7px;border-top:none;position:relative;margin-top:6px"><span style="position:absolute;left:50%;top:-13px;transform:translateX(-50%);width:18px;height:18px;border:3px solid #fff;border-bottom:none;border-radius:9px 9px 0 0"></span></div>
              </div>
              <div style="font-size:13px;font-weight:700;color:var(--ac,#171717);letter-spacing:.02em;margin-bottom:10px">암호화 대외비 · 자산 관리</div>
              <h1 style="font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1.25;margin-bottom:14px">비밀번호도 가계부도,<br>안전하게 잠가두고<br>필요할 때만 엽니다</h1>
              <p style="font-size:15px;line-height:1.6;color:#6b6b6b">패스키 하나로 잠금해제합니다. 중요한 비밀부터 수입·지출 내역까지, 암호화 키는 이 기기를 벗어나지 않습니다.</p>
            </div>
            <div style="display:flex;flex-direction:column;gap:8px;margin:26px 0 18px">
              <div style="display:flex;gap:10px;align-items:center;font-size:13.5px;color:#444"><span style="width:18px;height:18px;border-radius:50%;background:var(--soft,#f0f0f0);color:var(--ac,#171717);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800">✓</span>생체·기기 인증으로 본인 확인</div>
              <div style="display:flex;gap:10px;align-items:center;font-size:13.5px;color:#444"><span style="width:18px;height:18px;border-radius:50%;background:var(--soft,#f0f0f0);color:var(--ac,#171717);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800">✓</span>수입·지출과 남는 돈 자동 정리</div>
              <div style="display:flex;gap:10px;align-items:center;font-size:13.5px;color:#444"><span style="width:18px;height:18px;border-radius:50%;background:var(--soft,#f0f0f0);color:var(--ac,#171717);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800">✓</span>3분간 미사용 시 자동 재잠금</div>
            </div>
            <button onClick="{{ goRecovery }}" style="width:100%;height:54px;border:none;border-radius:16px;background:var(--ac,#171717);color:#fff;font:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:transform .12s,box-shadow .2s;box-shadow:0 8px 22px -8px var(--ac,#171717)" style-active="transform:scale(.97)">패스키 만들기</button>
            <div style="display:flex;gap:6px;justify-content:center;margin-top:18px">
              <span style="width:18px;height:5px;border-radius:3px;background:var(--ac,#171717)"></span>
              <span style="width:5px;height:5px;border-radius:3px;background:#dcdcdc"></span>
            </div>
          </div>
        </sc-if>
