# main 푸시 시 api·web 도커 이미지를 GHCR 에 빌드·푸시한다.
# 1코어 VPS 는 서버에서 빌드하지 않고 이 이미지를 pull 만 한다(make prod-deploy).
# 빌드는 GitHub 러너에서 수행되고 buildx 캐시(type=gha)로 레이어를 재사용한다.
name: build-and-push

on:
    push:
        branches: [main]
        paths-ignore:
            - "**/*.md"
            - "docs/**"
    workflow_dispatch:

env:
    IMAGE_API: ghcr.io/${{ github.repository }}-api
    IMAGE_WEB: ghcr.io/${{ github.repository }}-web

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - uses: docker/setup-buildx-action@v3

            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # NEXT_PUBLIC_API_BASE_URL 은 두 타깃에 동일하게 넘긴다 —
            # 공통 build 스테이지가 바이트 동일해져 web 빌드 시 api 빌드 캐시를 그대로 재사용한다.
            - name: Build & push API
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile
                  target: api
                  push: true
                  build-args: |
                      NEXT_PUBLIC_API_BASE_URL=/api
                  tags: |
                      ${{ env.IMAGE_API }}:latest
                      ${{ env.IMAGE_API }}:${{ github.sha }}
                  cache-from: type=gha,scope=daeoebi
                  cache-to: type=gha,scope=daeoebi,mode=max

            - name: Build & push WEB
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile
                  target: web
                  push: true
                  build-args: |
                      NEXT_PUBLIC_API_BASE_URL=/api
                  tags: |
                      ${{ env.IMAGE_WEB }}:latest
                      ${{ env.IMAGE_WEB }}:${{ github.sha }}
                  cache-from: type=gha,scope=daeoebi
                  cache-to: type=gha,scope=daeoebi,mode=max
